name: CI

# The full pipeline: lint + build + test for both languages, plus image builds
# and a docker-compose end-to-end. Jobs run in parallel; e2e waits for the
# unit/integration jobs so a compile break fails fast and cheap before the
# heavier compose run.
#
# push is limited to main: a PR branch used to trigger BOTH events, running every
# job twice per push (visible as duplicate check rows on PRs #11/#12). PRs get
# the pull_request run; main gets the push run; nothing is covered twice.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp:
    name: C++ — lint, build, test
    runs-on: ubuntu-latest
    # Run in the same image the project builds in, so clang-format (14.0.6),
    # RocksDB, and GoogleTest match local/prod exactly — no formatter version drift.
    container: debian:bookworm-slim
    steps:
      # git must exist before actions/checkout; install the toolchain in one go.
      - name: Install toolchain
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git g++ cmake make clang-format \
            librocksdb-dev libgtest-dev libspdlog-dev ca-certificates
      - uses: actions/checkout@v4
      - name: clang-format check
        run: |
          find src tests \( -name '*.cpp' -o -name '*.h' \) -print0 \
            | xargs -0 clang-format --dry-run -Werror
      # Cache the CMake build dir (incl. FetchContent _deps) keyed on the CMake files.
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt') }}
      # WITH_PROMETHEUS=OFF: the unit suite links kv_core, which never needs
      # prometheus-cpp; skipping the fetch keeps this job fast. The node binary
      # still compiles here via its fallback metrics/logging paths.
      - name: Build + test
        run: |
          cmake -S . -B build -DBUILD_TESTING=ON -DWITH_PROMETHEUS=OFF
          cmake --build build -j"$(nproc)"
          ctest --test-dir build --output-on-failure

  gateway:
    name: Gateway — spotless, unit + integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      # RealClusterIT drives the gateway against the real node image; build it
      # fast (no prometheus — the IT tests the wire protocol, not metrics).
      - name: Build node image for integration test
        run: docker build -t mini-dynamo-node:ci --build-arg WITH_PROMETHEUS=OFF .
      - name: Verify (spotless check + unit + integration)
        working-directory: gateway
        env:
          NODE_IMAGE: mini-dynamo-node:ci
        run: ./mvnw -B verify

  images:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Proves the production Dockerfiles build (node WITH prometheus + gateway).
      - name: Build node image
        run: docker build -t mini-dynamo-node:latest .
      - name: Build gateway image
        run: docker build -t mini-dynamo-gateway:latest ./gateway

  e2e:
    name: End-to-end (docker compose)
    runs-on: ubuntu-latest
    needs: [cpp, gateway]
    steps:
      - uses: actions/checkout@v4
      # Stands up the full stack and asserts availability under a node kill +
      # convergence via read repair. Builds images with prometheus ON because the
      # convergence check reads the nodes' /metrics.
      - name: Run e2e
        run: bash scripts/e2e.sh
