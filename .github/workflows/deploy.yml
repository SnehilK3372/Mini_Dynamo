name: Deploy to EC2 (manual)

# Manual only — there is NO auto-deploy on push/merge. Trigger from the Actions
# tab ("Run workflow"). SSHes into the single EC2 host, pulls the chosen ref, and
# brings the compose stack up. Requires three repo secrets:
#   EC2_HOST     public IP or DNS of the instance
#   EC2_USER     login user (ec2-user on Amazon Linux, ubuntu on Ubuntu)
#   EC2_SSH_KEY  the PRIVATE key (full PEM contents) for that user
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to deploy on the instance"
        required: false
        default: main

# Never run two deploys against the same box at once.
concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # The repo was cloned to ~/Mini_Dynamo by deploy/aws/bootstrap.sh.
          # .env on the instance holds the real secrets and is never overwritten here.
          script: |
            set -euo pipefail
            cd ~/Mini_Dynamo
            git fetch --all --prune
            git checkout "${{ github.event.inputs.ref }}"
            git pull --ff-only origin "${{ github.event.inputs.ref }}"
            docker compose up -d --build
            docker compose ps
