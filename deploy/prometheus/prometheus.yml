# Prometheus scrape config for the Mini Dynamo stack. Prometheus reaches every
# target over the compose network by container name, so this file needs no host
# ports. Two jobs: the JVM gateway (Micrometer) and the three C++ nodes
# (prometheus-cpp). Prometheus tags each series with a `job` and an `instance`
# (target host:port), which is what the per-node health panel keys on.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: gateway
    metrics_path: /actuator/prometheus
    # The gateway is scaled to multiple replicas behind nginx (Tier 4.4). A single
    # static target would only ever scrape one replica, so discover every replica's
    # IP via Docker's DNS (an A-record lookup of the compose service name returns
    # all task IPs). Each replica is scraped and labelled by its instance IP.
    dns_sd_configs:
      - names: ['gateway']
        type: A
        port: 8080
        refresh_interval: 10s

  - job_name: mini-dynamo-nodes
    metrics_path: /metrics
    static_configs:
      - targets: ['node1:9100', 'node2:9100', 'node3:9100']
