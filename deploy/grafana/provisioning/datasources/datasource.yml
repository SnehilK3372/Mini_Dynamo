# Auto-provisions the Prometheus datasource at Grafana start so no click-ops are
# needed. The fixed uid ("prometheus") is what the provisioned dashboard's panels
# reference, so the datasource and dashboard bind without manual selection.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
