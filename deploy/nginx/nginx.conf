# Front door for the horizontally-scaled gateway. Round-robins across all
# gateway replicas by resolving the compose service name "gateway" through
# Docker's embedded DNS (127.0.0.11) on every request — using a variable in
# proxy_pass forces re-resolution, so replicas added/removed by `--scale` are
# picked up without an nginx reload.
events {}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        # Health of the LB itself (does not touch the gateways).
        location = /nginx-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            set $upstream http://gateway:8080;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}
