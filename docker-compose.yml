services:
  node1:
    build:
      context: .
      args:
        WITH_PROMETHEUS: ${WITH_PROMETHEUS:-ON}
    container_name: node1
    hostname: node1
    environment:
      NODE_ID: node1
      NODE_PORT: 5001
      METRICS_PORT: 9100
      # node1 is the initial seed — no SEED_NODES means self-bootstrap.
    ports:
      - "5001:5001"
      - "9101:9100"
    networks:
      - dhtnet
    restart: unless-stopped

  node2:
    build:
      context: .
      args:
        WITH_PROMETHEUS: ${WITH_PROMETHEUS:-ON}
    container_name: node2
    hostname: node2
    environment:
      NODE_ID: node2
      NODE_PORT: 5002
      METRICS_PORT: 9100
      SEED_NODES: node1:5001
    ports:
      - "5002:5002"
      - "9102:9100"
    networks:
      - dhtnet
    depends_on:
      - node1
    restart: unless-stopped

  node3:
    build:
      context: .
      args:
        WITH_PROMETHEUS: ${WITH_PROMETHEUS:-ON}
    container_name: node3
    hostname: node3
    environment:
      NODE_ID: node3
      NODE_PORT: 5003
      METRICS_PORT: 9100
      SEED_NODES: node1:5001
    ports:
      - "5003:5003"
      - "9103:9100"
    networks:
      - dhtnet
    depends_on:
      - node1
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: minidynamo
      POSTGRES_USER: minidynamo
      POSTGRES_PASSWORD: minidynamo
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dhtnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minidynamo -d minidynamo"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  gateway:
    build: ./gateway
    container_name: gateway
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/minidynamo
      DB_USERNAME: minidynamo
      DB_PASSWORD: minidynamo
      CLUSTER_NODES: node1:5001,node2:5002,node3:5003
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret-change-me-please-0123456789}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-changeme}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:-}
    ports:
      - "8080:8080"
    networks:
      - dhtnet
    depends_on:
      postgres:
        condition: service_healthy
      node1:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - dhtnet
    depends_on:
      - node1
      - gateway
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - dhtnet
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  dhtnet:
    driver: bridge

volumes:
  pgdata:
  grafana-data:
