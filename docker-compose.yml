services:
  node1:
    build: .
    container_name: node1
    hostname: node1
    environment:
      NODE_ID: node1
      NODE_PORT: 5001
      # node1 is bootstrap, no BOOTSTRAP_IP
    ports:
      - "5001:5001"
    networks:
      - dhtnet
    restart: unless-stopped

  node2:
    build: .
    container_name: node2
    hostname: node2
    environment:
      NODE_ID: node2
      NODE_PORT: 5002
      BOOTSTRAP_IP: node1
      BOOTSTRAP_PORT: 5001
    ports:
      - "5002:5002"
    networks:
      - dhtnet
    depends_on:
      - node1
    restart: unless-stopped

  node3:
    build: .
    container_name: node3
    hostname: node3
    environment:
      NODE_ID: node3
      NODE_PORT: 5003
      BOOTSTRAP_IP: node1
      BOOTSTRAP_PORT: 5001
    ports:
      - "5003:5003"
    networks:
      - dhtnet
    depends_on:
      - node1
    restart: unless-stopped

networks:
  dhtnet:
    driver: bridge
